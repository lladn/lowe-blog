baseURL: "https://ladiona.louie.site"
languageCode: en-us
title: Louie Ladiona
theme: PaperMod

author:
  name: Louie Ladiona



params:
  env: production
  author: Louie Ladiona
  ShowShareButtons: true
  ShareButtons:
    - linkedin
  ShowBreadCrumbs: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  hideSummary: false
  hideFooter: false
  profileMode:
    enabled: true
    title: Look at the sky, beautiful isn't it? 
    subtitle: "This is my personal blog. I write about topics that I enjoy,."
    #  imageUrl: <image link>
    # imageTitle: <title of image as alt>
    imageWidth: 120
    imageHeight: 120
  homeInfoParams:
    title: Look at the sky, beautiful isn't it? 
    Content: This is my personal blog. I write about topics that I enjoy, mostly about software engineering, testing and software quality. Read more about me [here](/about).
  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/ladionalouie"
    - name: github
      url: "https://github.com/lladn"
    - name: instagram
      url: "https://instagram.com/louieladn"
    - name: "rss"
      url: "https://ladiona.louie.site"
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0 # Determines approximately where in the text is the pattern expected to be found.
    distance: 100 # A distance of 100 would require a perfect match to be within 20 characters of the location to be found using a threshold of 0.2
    threshold: 0.3 # At what point does the match algorithm give up. A threshold of 0.0 requires a perfect match (of both letters and location), a threshold of 1.0 would match anything.
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - RSS
    - JSON




menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 15
    - identifier: tags
      name: Projects
      url: /projects/
      weight: 20
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 25
    - identifier: search
      name: Search
      url: /search/
      weight: 30