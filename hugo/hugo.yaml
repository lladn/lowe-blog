baseURL: "https://ladiona-louie.site/"
title: "Louie Ladiona"
author: "Louie Ladiona"
copyright: "© 2025, lowe"
languageCode: "en"
DefaultContentLanguage: "en"
enableInlineShortcodes: true
ignoreErrors:
  - "error-remote-getjson"

pagination:
  pagerSize: 3

theme: "paper"

module:
  imports: 
    - path: "github.com/nanxiaobei/hugo-paper"

params:
  color: "linen"
  twitter: "lowe"
  github: "lowe"
  instagram: "louieladn"
  avatar: "ladiona.louie@gmail.com"
  name: "Lowe"
  bio: "Discover fresh context"

markup:
  goldmark:
    renderer:
      unsafe: true
  # highlight:
  #   lineNos: true

menu:
  main:
    - identifier: "about"
      name: "About"
      url: "/about/"
      weight: 10
    - identifier: "contact"
      name: "Contact"
      url: "/contact/"
      weight: 10

taxonomies:
  category: "categories"
  tag: "tags"
  series: "series"

privacy:
  vimeo:
    disabled: false
    simple: true
  x:
    disabled: false
    enableDNT: true
    simple: true
  instagram:
    disabled: false
    simple: true
  youtube:
    disabled: false
    privacyEnhanced: true

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true